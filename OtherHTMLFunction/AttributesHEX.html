<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定義能力六邊形產生器</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .name-input {
            font-size: 1.2rem;
            padding: 8px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            width: 220px;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        #canvasContainer {
            background: #fff;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 320px;
            background: #fdfdfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .attr-row {
            display: grid;
            grid-template-columns: 90px 140px 40px;
            align-items: center;
            gap: 10px;
        }

        .attr-name-input {
            width: 80px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-download {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        .btn-download:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <input type="text" id="charName" class="name-input" value="牌組名稱" placeholder="輸入名字...">
        </div>

        <div class="main-content">
            <div id="canvasContainer">
                <canvas id="radarCanvas" width="600" height="550"></canvas>
            </div>

            <div class="controls">
                <div style="display: grid; grid-template-columns: 90px 140px 40px; gap: 10px; font-size: 12px; color: #777; margin-bottom: 5px; font-weight: bold;">
                    <span>屬性名稱</span>
                    <span>調整數值(0-20)</span>
                    <span>值</span>
                </div>
                <div id="attrInputs"></div>
            </div>
        </div>

        <button class="btn-download" onclick="downloadPNG()">下載圖表 (PNG)</button>
    </div>

<script>
    const canvas = document.getElementById('radarCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('charName');
    const attrInputsContainer = document.getElementById('attrInputs');

    // 初始化 6 個屬性
    const attributes = [
        { label: '完整度', value: 10 },
        { label: '強度', value: 10 },
        { label: '新手上手難易度', value: 10 },
        { label: '發展潛力', value: 10 },
        { label: '價格', value: 10 },
        { label: '快感', value: 10 }
    ];

    const centerX = canvas.width / 2 - 30; // 中心稍微偏左
    const centerY = canvas.height / 2 + 20;
    const scale = 12; // 調整比例：每一點 = 12 像素
    const angleStep = (Math.PI * 2) / 6;

    // 初始化介面
    function initUI() {
        attributes.forEach((attr, i) => {
            const row = document.createElement('div');
            row.className = 'attr-row';
            row.innerHTML = `
                <input type="text" class="attr-name-input" value="${attr.label}" data-idx="${i}" maxlength="6">
                <input type="range" min="0" max="20" step="1" value="${attr.value}" data-idx="${i}">
                <span id="val-${i}" style="font-weight:bold; color:#4a90e2">${attr.value}</span>
            `;
            attrInputsContainer.appendChild(row);
        });
    }

    // 監聽修改
    document.addEventListener('input', (e) => {
        const idx = e.target.dataset.idx;
        if (idx !== undefined) {
            if (e.target.type === 'text') {
                attributes[idx].label = e.target.value;
            } else {
                attributes[idx].value = parseInt(e.target.value);
                document.getElementById(`val-${idx}`).innerText = e.target.value;
            }
            draw();
        }
        if (e.target.id === 'charName') draw();
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. 繪製基準線 (只有數值 10 的外框)
        drawHexagonFrame(10, "#999", 2);

        // 2. 繪製從中心放射到 20 的軸線
        for (let i = 0; i < 6; i++) {
            const angle = i * angleStep - Math.PI / 2;
            ctx.beginPath();
            ctx.strokeStyle = "#eee";
            ctx.lineWidth = 1;
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + Math.cos(angle) * 20 * scale, centerY + Math.sin(angle) * 20 * scale);
            ctx.stroke();
        }

        // 3. 繪製能力面積 (先畫面積)
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const dist = attributes[i].value * scale;
            const x = centerX + Math.cos(angle) * dist;
            const y = centerY + Math.sin(angle) * dist;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(74, 144, 226, 0.5)";
        ctx.fill();
        ctx.strokeStyle = "rgba(74, 144, 226, 0.8)";
        ctx.lineWidth = 3;
        ctx.stroke();

        // 4. 繪製數據圓點
        for (let i = 0; i < 6; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const dist = attributes[i].value * scale;
            ctx.beginPath();
            ctx.arc(centerX + Math.cos(angle) * dist, centerY + Math.sin(angle) * dist, 4, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.strokeStyle = "#4a90e2";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 5. 繪製屬性名稱 (放在約數值 12 的位置，並放在最上層)
        for (let i = 0; i < 6; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const textRadius = 12 * scale + 15; // 數值 12 的距離再加上一點點間距
            const tx = centerX + Math.cos(angle) * textRadius;
            const ty = centerY + Math.sin(angle) * textRadius;

            ctx.fillStyle = "#222";
            ctx.font = "bold 15px Sans-Serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            // 加上一點白色陰影/發光，確保蓋在面積上時也清晰
            ctx.shadowColor = "white";
            ctx.shadowBlur = 4;
            ctx.fillText(attributes[i].label, tx, ty);
            ctx.shadowBlur = 0; // 重設陰影
        }

        // 6. 繪製名字 (右上角)
        ctx.fillStyle = "#333";
        ctx.font = "bold 24px Sans-Serif";
        ctx.textAlign = "left";
        ctx.fillText(nameInput.value, centerX + 140, centerY - 200);
    }

    function drawHexagonFrame(value, color, width) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        for (let i = 0; i < 6; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const x = centerX + Math.cos(angle) * value * scale;
            const y = centerY + Math.sin(angle) * value * scale;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
    }

    function downloadPNG() {
        const link = document.createElement('a');
        const name = nameInput.value.trim() || 'radar';
        link.download = `${name}_status.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    initUI();
    draw();
</script>

</body>
</html>
