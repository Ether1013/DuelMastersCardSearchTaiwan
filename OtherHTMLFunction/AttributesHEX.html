<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debugged 動態能力圖</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f4f8;
            --danger-color: #ff4d4f;
            --success-color: #52c41a;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 1100px;
            width: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header-section { margin-bottom: 10px; }
        .name-input {
            font-size: 1.3rem;
            padding: 10px 20px;
            border: 2px solid #e1e4e8;
            border-radius: 10px;
            text-align: center;
            width: 250px;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            width: 100%;
        }

        #canvasContainer {
            background: #fff;
            flex: 1;
            min-width: 500px;
            display: flex;
            justify-content: center;
        }

        .controls {
            flex: 0 0 400px;
            background: #fafafa;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #eaeaea;
        }

        .btn-add-main {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add-main:hover { background-color: #73d13d; }

        .attr-list { display: flex; flex-direction: column; gap: 12px; }

        .attr-row {
            display: grid;
            grid-template-columns: 80px 1fr 35px 40px;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .attr-name-input {
            width: 100%;
            padding: 6px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
        }

        .btn-delete {
            background-color: var(--danger-color);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover:not(:disabled) { background-color: #ff7875; }
        .btn-delete:disabled { background-color: #d9d9d9; cursor: not-allowed; opacity: 0.5; }

        .btn-download {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <input type="text" id="charName" class="name-input" value="牌組名稱">
        </div>

        <div class="main-content">
            <div id="canvasContainer">
                <canvas id="radarCanvas" width="600" height="550"></canvas>
            </div>

            <div class="controls">
                <button class="btn-add-main" id="btnAdd">＋ 新增一個屬性</button>
                <div style="display: grid; grid-template-columns: 80px 1fr 35px 40px; gap: 12px; font-size: 12px; color: #888; margin-bottom: 10px; padding: 0 8px;">
                    <span>屬性名稱</span><span>數值</span><span>值</span><span>刪除</span>
                </div>
                <div id="attrInputs" class="attr-list"></div>
            </div>
        </div>
        <button class="btn-download" onclick="downloadPNG()">保存為 PNG 圖片</button>
    </div>

<script>
    const canvas = document.getElementById('radarCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('charName');
    const attrInputsContainer = document.getElementById('attrInputs');
    const btnAdd = document.getElementById('btnAdd');

    // 資料狀態
    let attributes = [
        { label: '完整度', value: 10 },
        { label: '強度', value: 10 },
        { label: '新手上手難易度', value: 10 },
        { label: '發展潛力', value: 10 },
        { label: '幸運', value: 10 },
    ];

    const centerX = canvas.width / 2 - 40; 
    const centerY = canvas.height / 2 + 20;
    const scale = 12; 

    // 初始化介面渲染
    function renderUI() {
        attrInputsContainer.innerHTML = '';
        const isMin = attributes.length <= 3;

        attributes.forEach((attr, i) => {
            const row = document.createElement('div');
            row.className = 'attr-row';
            row.innerHTML = `
                <input type="text" class="attr-name-input" value="${attr.label}" data-idx="${i}">
                <input type="range" class="attr-slider" min="0" max="20" value="${attr.value}" data-idx="${i}">
                <span style="font-weight:bold; color:#4a90e2">${attr.value}</span>
                <button class="btn-delete" data-idx="${i}" ${isMin ? 'disabled' : ''}>×</button>
            `;
            attrInputsContainer.appendChild(row);
        });
        draw();
    }

    // 事件監聽器：委託給容器處理
    attrInputsContainer.addEventListener('click', (e) => {
        // 檢查是否點擊到刪除按鈕 (或是按鈕內的文字)
        const deleteBtn = e.target.closest('.btn-delete');
        if (deleteBtn && !deleteBtn.disabled) {
            const index = parseInt(deleteBtn.dataset.idx);
            attributes.splice(index, 1); // 刪除資料
            renderUI(); // 重新渲染介面與圖表
        }
    });

    attrInputsContainer.addEventListener('input', (e) => {
        const idx = parseInt(e.target.dataset.idx);
        if (isNaN(idx)) return;

        if (e.target.classList.contains('attr-name-input')) {
            attributes[idx].label = e.target.value;
        } else if (e.target.classList.contains('attr-slider')) {
            attributes[idx].value = parseInt(e.target.value);
            // 即時更新旁邊的數字顯示，不用整個 renderUI
            e.target.nextElementSibling.innerText = e.target.value;
        }
        draw();
    });

    btnAdd.addEventListener('click', () => {
        attributes.push({ label: '新屬性', value: 10 });
        renderUI();
    });

    nameInput.addEventListener('input', draw);

    // 繪圖邏輯
    function draw() {
        const n = attributes.length;
        const angleStep = (Math.PI * 2) / n;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. 基準框 (10)
        ctx.beginPath();
        ctx.strokeStyle = "#ccc";
        ctx.lineWidth = 2;
        for (let i = 0; i < n; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const x = centerX + Math.cos(angle) * 10 * scale;
            const y = centerY + Math.sin(angle) * 10 * scale;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();

        // 2. 放射軸線
        for (let i = 0; i < n; i++) {
            const angle = i * angleStep - Math.PI / 2;
            ctx.beginPath();
            ctx.strokeStyle = "#f0f0f0";
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + Math.cos(angle) * 20 * scale, centerY + Math.sin(angle) * 20 * scale);
            ctx.stroke();
        }

        // 3. 能力面積
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const dist = attributes[i].value * scale;
            const x = centerX + Math.cos(angle) * dist;
            const y = centerY + Math.sin(angle) * dist;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(74, 144, 226, 0.5)";
        ctx.fill();
        ctx.strokeStyle = "rgba(74, 144, 226, 0.8)";
        ctx.lineWidth = 3;
        ctx.stroke();

        // 4. 文字標籤
        ctx.fillStyle = "#333";
        ctx.font = "bold 14px Sans-Serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (let i = 0; i < n; i++) {
            const angle = i * angleStep - Math.PI / 2;
            const textRadius = 12 * scale + 15;
            const tx = centerX + Math.cos(angle) * textRadius;
            const ty = centerY + Math.sin(angle) * textRadius;
            ctx.fillText(attributes[i].label, tx, ty);
        }

        // 5. 名字
        ctx.fillStyle = "#000";
        ctx.font = "bold 24px Sans-Serif";
        ctx.textAlign = "left";
        ctx.fillText(nameInput.value, centerX + 150, centerY - 200);
    }

    function downloadPNG() {
        const link = document.createElement('a');
        link.download = `${nameInput.value || 'radar'}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // 啟動
    renderUI();
</script>
</body>
</html>
